<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <meta name="theme-color" content="#0d9488" />
  <title>Statistik - Rage Cage</title>
  <style>
    :root {
      --brand: #0d9488;
      --brand-2: #0f766e;
      --primary: #0d9488;
      --on-primary: #ffffff;
      --cup: #d8352f;
      --danger: #e11d48;
      --danger-dark: #be123c;
      --add: #059669;
      --add-dark: #047857;
      --text: #134e4a;
      --muted: #5b807b;
      --border: #cbeee8;
      --surface: #ffffff;
      --surface-2: #f0fdfa;
      --highlight: #ecfdf5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--brand-2) 100%);
      min-height: 100vh;
      min-height: 100dvh; /* iOS: Adressleiste nicht mitrechnen */
      padding: 20px;
      padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Roter Party-Becher als Icon (per <use href="#cupLogo">) */
    .svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }
    .cup-ico { width: 0.85em; height: 1.05em; vertical-align: -0.18em; }
    .ic {
      width: 1em; height: 1em; vertical-align: -0.15em;
      fill: none; stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .empty-state-icon .cup-ico { width: 44px; height: 54px; vertical-align: 0; }
    .empty-state-icon .ic { width: 44px; height: 44px; vertical-align: 0; }

    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
        padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }
      .card { padding: 20px; }
      h1 { font-size: 26px; }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #333;
      font-weight: 700;
    }

    .nav-link {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .nav-link:hover {
      background: var(--brand-2);
    }

    .stats-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--brand-2) 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Abend-Übersicht (ohne Code): Liste der eigenen Abende */
    .evening-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-top: 10px;
      border-radius: 8px;
      background: #f8f9fa;
      text-decoration: none;
      color: #333;
      transition: background 0.15s;
    }

    .evening-item:hover {
      background: var(--surface-2);
    }

    .evening-item-code {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--primary);
    }

    .evening-item-info {
      color: #777;
      font-size: 14px;
    }

    /* Abend-Zeitraum unter der Überschrift */
    .evening-period {
      margin: -12px 0 20px;
      color: #888;
      font-size: 14px;
    }

    /* Highlight-Karten (Marathon-Spieler, Becher-Magnet) */
    .highlights {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .highlight-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 12px;
      background: #fdf6e0;
      border: 1px solid #f3e3b3;
    }

    .highlight-icon {
      font-size: 32px;
      display: flex;
      align-items: center;
    }

    .highlight-icon .cup-ico { width: 30px; height: 37px; }

    .highlight-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b08a2e;
      font-weight: 600;
    }

    .highlight-value {
      font-size: 17px;
      font-weight: 700;
      color: #333;
    }

    /* Breite Tabellen scrollen im Container statt die Seite aufzublaehen */
    #playersContainer, #roundsContainer {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .games-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .games-table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
    }

    .games-table td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .games-table tr:hover {
      background: #f8f9fa;
    }

    /* Entfernte Spieler: dezent ausgegraut, ohne Label */
    .games-table tr.inactive td {
      color: #b5b5b5;
    }

    /* Sortierbare Spaltenköpfe */
    .games-table th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .games-table th.sortable:hover {
      color: var(--primary);
    }

    /* Längste Runde: dezent golden hinterlegt */
    .games-table tr.longest td {
      background: #fdf6e0;
    }

    .games-table tr.longest:hover {
      background: #fdf6e0;
    }

    /* Mobile Tabellen-Overrides: NACH den Basisregeln (gleiche Spezifitaet, spaeter gewinnt) */
    @media (max-width: 768px) {
      .games-table .hide-mobile { display: none; }
      .games-table th, .games-table td { padding: 6px 5px; font-size: 13px; }
      /* Lange Koepfe duerfen umbrechen statt Spalten aufzublaehen */
      .games-table th.sortable { white-space: normal; vertical-align: bottom; }
      /* Touch-Ziel >= 44px fuer Sortier-Koepfe */
      .games-table th.sortable { padding-top: 14px; padding-bottom: 14px; }
      /* Nur lange Spielernamen kuerzen; Runden-Datum bleibt einzeilig ganz */
      #playersContainer .games-table td:first-child {
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #roundsContainer .games-table td:first-child { white-space: nowrap; }
    }


    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- Roter Party-Becher (Solo-Cup) als wiederverwendbares Icon -->
  <svg class="svg-defs" aria-hidden="true" focusable="false" width="0" height="0">
    <symbol id="cupLogo" viewBox="0 0 100 120">
      <path d="M12 26 L88 26 L72 106 A22 5 0 0 1 28 106 Z" fill="#d8352f" stroke="#5c0f0c" stroke-width="3" stroke-linejoin="round"/>
      <path d="M15.2 42 Q50 45 84.8 42" fill="none" stroke="#a81f1b" stroke-width="2.4"/>
      <path d="M17.2 52 Q50 55 82.8 52" fill="none" stroke="#a81f1b" stroke-width="2.4"/>
      <path d="M23.6 84 Q50 87 76.4 84" fill="none" stroke="#a81f1b" stroke-width="2.4"/>
      <path d="M25.6 94 Q50 96.5 74.4 94" fill="none" stroke="#a81f1b" stroke-width="2.4"/>
      <ellipse cx="50" cy="24" rx="40" ry="9" fill="#ef4b45" stroke="#5c0f0c" stroke-width="3"/>
      <path d="M11 24 A40 9 0 0 0 89 24 Q92 25 95 21 L98 22 Q90 30 78 27 A40 9 0 0 0 11 24 Z" fill="#f6a723" stroke="#c67d0d" stroke-width="1.6"/>
      <circle cx="42" cy="15" r="11" fill="#fdfdfd" stroke="#c9c9c9" stroke-width="1.4"/>
    </symbol>
    <!-- Einheitliches Line-Icon-Set (erbt Farbe via currentColor) -->
    <symbol id="ic-chart" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></symbol>
    <symbol id="ic-music" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></symbol>
    <symbol id="ic-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
    <symbol id="ic-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
    <symbol id="ic-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
    <symbol id="ic-activity" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></symbol>
  </svg>

  <div class="container">
    <div class="card">
      <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
        <a href="/" class="nav-link" id="backToEveningLink" style="display: none; background: var(--add);"><svg class="cup-ico" aria-hidden="true"><use href="#cupLogo" xlink:href="#cupLogo"/></svg> Zum laufenden Abend</a>
        <a href="#" class="nav-link" id="exportLink" style="display: none; background: var(--brand);"><svg class="ic" aria-hidden="true"><use href="#ic-download" xlink:href="#ic-download"/></svg> CSV-Export</a>
      </div>
      
      <h1><svg class="ic" aria-hidden="true"><use href="#ic-chart" xlink:href="#ic-chart"/></svg> Statistik <span id="eveningCodeTitle" style="color: var(--primary);"></span></h1>
      <div class="evening-period" id="eveningPeriod" style="display: none;"></div>

      <div class="stats-overview" id="statsOverview">
        <div class="stat-card">
          <div class="stat-value" id="totalRounds">-</div>
          <div class="stat-label">Runden</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalDuration">-</div>
          <div class="stat-label">Gesamte Spielzeit</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="longestRound">-</div>
          <div class="stat-label">Längste Runde</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgRound">-</div>
          <div class="stat-label">Ø Runde</div>
        </div>
      </div>

      <div class="highlights" id="highlights" style="display: none;"></div>

      <h2 style="font-size: 20px; margin-bottom: 4px;" id="playersHeading"><svg class="ic" aria-hidden="true"><use href="#ic-users" xlink:href="#ic-users"/></svg> Spieler</h2>
      <div id="playersContainer">
        <div class="loading">Lade Statistik...</div>
      </div>

      <h2 style="font-size: 20px; margin: 28px 0 4px;" id="roundsHeading"><svg class="ic" aria-hidden="true"><use href="#ic-music" xlink:href="#ic-music"/></svg> Runden</h2>
      <div id="roundsContainer"></div>
    </div>
  </div>

  <script>
    const API_BASE = "";
    const CUP_SVG = '<svg class="cup-ico" aria-hidden="true"><use href="#cupLogo" xlink:href="#cupLogo"></use></svg>';
    const ic = (id) => `<svg class="ic" aria-hidden="true"><use href="#${id}" xlink:href="#${id}"></use></svg>`;
    const playersContainer = document.getElementById("playersContainer");
    const roundsContainer = document.getElementById("roundsContainer");

    // Abend-Code: URL (/statistics/<code>) vor localStorage
    const pathMatch = window.location.pathname.match(/^\/statistics\/([A-Za-z0-9]+)$/);
    const eveningCode = pathMatch ? pathMatch[1].toUpperCase()
      : localStorage.getItem("cagemachine:lastEveningCode");

    function esc(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    async function apiCall(endpoint, method = "GET", body = null) {
      try {
        const options = {
          method: method,
          headers: {
            "Content-Type": "application/json"
          }
        };
        if (body) {
          options.body = JSON.stringify(body);
        }
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        // Prüfe ob Response erfolgreich war
        if (!response.ok) {
          // Versuche JSON-Fehler zu lesen, sonst generischer Fehler
          try {
            const errorData = await response.json();
            return errorData;
          } catch {
            return { error: `HTTP ${response.status}: ${response.statusText}` };
          }
        }
        
        const data = await response.json();
        return data;
      } catch (error) {
        console.error("API-Fehler:", error);
        // Gebe konsistentes Fehlerformat zurück, das von allen Handlern erwartet wird
        return { error: "Netzwerk-Fehler: " + (error.message || "Verbindung zum Server fehlgeschlagen") };
      }
    }

    function formatDateTime(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      return date.toLocaleString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    // Modus-Labels vom Server (einzige Definitionsstelle: game_manager.py)
    let modeLabels = {};
    async function loadModeLabels() {
      const data = await apiCall("/api/modes", "GET");
      if (data.modes) {
        data.modes.forEach(m => { modeLabels[m.id] = m.label; });
      }
    }

    async function loadStatistics() {
      if (!eveningCode) {
        await renderEveningOverview();
        return;
      }

      const data = await apiCall(`/api/evening/${encodeURIComponent(eveningCode)}/statistics`, "GET");

      if (data.error) {
        playersContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <div class="empty-state-text">${esc(data.error)}</div>
        </div>`;
        return;
      }

      document.getElementById("eveningCodeTitle").textContent =
        data.evening.name ? `${data.evening.code} · ${data.evening.name}` : data.evening.code;
      document.getElementById("totalRounds").textContent = data.summary.total_rounds;
      document.getElementById("totalDuration").textContent = data.summary.total_duration_formatted || "00:00";
      document.getElementById("longestRound").textContent =
        data.summary.longest_round !== null ? data.summary.longest_round_formatted : "–";
      document.getElementById("avgRound").textContent =
        data.summary.avg_duration !== null ? data.summary.avg_duration_formatted : "–";

      // Abend-Zeitraum: erste Runde bis Ende der letzten
      const periodEl = document.getElementById("eveningPeriod");
      if (data.summary.first_round_at) {
        const from = formatDateTime(data.summary.first_round_at);
        let to = formatDateTime(data.summary.last_round_at);
        if (from.slice(0, 10) === to.slice(0, 10)) {
          to = to.slice(-5); // gleicher Tag: hinten nur die Uhrzeit
        }
        periodEl.textContent = `🕐 ${from} – ${to} Uhr`;
        periodEl.style.display = "block";
      } else {
        periodEl.style.display = "none";
      }

      renderHighlights(data);
      lastData = data;
      renderTables();
    }

    // Ohne Code: Abende dieses Geräts (übers Cookie gefiltert)
    async function renderEveningOverview() {
      document.getElementById("statsOverview").style.display = "none";
      document.getElementById("highlights").style.display = "none";
      document.getElementById("roundsHeading").style.display = "none";
      document.getElementById("playersHeading").innerHTML = CUP_SVG + " Deine Abende";

      const data = await apiCall("/api/evenings", "GET");
      const evenings = data.evenings || [];
      if (!evenings.length) {
        playersContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon"><svg class="cup-ico" aria-hidden="true"><use href="#cupLogo" xlink:href="#cupLogo"/></svg></div>
          <div class="empty-state-text">Kein aktiver Abend ausgewählt</div>
        </div>`;
        return;
      }

      playersContainer.innerHTML = "";
      evenings.forEach(e => {
        const item = document.createElement("a");
        item.className = "evening-item";
        item.href = `/statistics/${encodeURIComponent(e.code)}`;

        const codeEl = document.createElement("span");
        codeEl.className = "evening-item-code";
        codeEl.textContent = e.name ? `${e.code} · ${e.name}` : e.code;

        const info = document.createElement("span");
        info.className = "evening-item-info";
        info.textContent =
          `${formatDateTime(e.created_at)} · ${e.player_count} Spieler · ${e.round_count} Runden`;

        item.append(codeEl, info);
        playersContainer.appendChild(item);
      });
    }

    // Highlight-Karten: meiste Spielzeit und meiste Startbecher
    function renderHighlights(data) {
      const el = document.getElementById("highlights");
      const cards = [];

      const byTime = [...data.players].sort((a, b) => b.total_duration - a.total_duration)[0];
      if (byTime && byTime.total_duration > 0) {
        cards.push({ icon: ic("ic-activity"), title: "Marathon-Spieler",
                     value: `${byTime.name} · ${byTime.total_duration_formatted}` });
      }
      const byCups = [...data.players].sort((a, b) => b.start_cups - a.start_cups)[0];
      if (byCups && byCups.start_cups > 0) {
        cards.push({ icon: CUP_SVG, title: "Becher-Magnet",
                     value: `${byCups.name} · ${byCups.start_cups}× Startbecher` });
      }

      if (!cards.length) {
        el.style.display = "none";
        return;
      }
      el.innerHTML = "";
      cards.forEach(c => {
        const card = document.createElement("div");
        card.className = "highlight-card";
        const icon = document.createElement("div");
        icon.className = "highlight-icon";
        // Emoji als Text, Becher-SVG als Markup
        if (c.icon.startsWith("<")) icon.innerHTML = c.icon;
        else icon.textContent = c.icon;
        const text = document.createElement("div");
        const title = document.createElement("div");
        title.className = "highlight-title";
        title.textContent = c.title;
        const value = document.createElement("div");
        value.className = "highlight-value";
        value.textContent = c.value; // textContent schützt vor XSS über Namen
        text.append(title, value);
        card.append(icon, text);
        el.appendChild(card);
      });
      el.style.display = "grid";
    }

    // Sortierbare Tabellen (Klick = auf, zweiter Klick = ab)
    let lastData = null;
    const sortState = {
      players: { key: null, dir: 1 },
      rounds: { key: null, dir: 1 },
    };

    const PLAYER_COLUMNS = [
      { key: "name", label: "Spieler", value: p => p.name.toLowerCase() },
      { key: "rounds", label: "Runden", value: p => p.rounds_played },
      { key: "time", label: "Spielzeit", value: p => p.total_duration },
      { key: "cups", label: "Startbecher", value: p => p.start_cups, hideMobile: true },
      { key: "quota", label: "Quote", value: p => p.participation },
    ];

    const ROUND_COLUMNS = [
      { key: "started", label: "Gestartet am", value: r => r.started_at },
      { key: "mode", label: "Modus", value: r => (modeLabels[r.mode] || r.mode).toLowerCase() },
      // Laufende Runde zählt als längste, Runden ohne Dauer ans Ende
      { key: "duration", label: "Dauer", value: r => r.ended_at === null ? Infinity : (r.duration ?? -1) },
      { key: "players", label: "Mitspieler", value: r => r.player_count },
    ];

    function sortedRows(rows, columns, state) {
      if (!state.key) return rows;
      const col = columns.find(c => c.key === state.key);
      return [...rows].sort((a, b) => {
        const va = col.value(a);
        const vb = col.value(b);
        return (va < vb ? -1 : va > vb ? 1 : 0) * state.dir;
      });
    }

    function headerRow(columns, state, tableName) {
      const cells = columns.map(c => {
        const arrow = state.key === c.key ? (state.dir === 1 ? " ▲" : " ▼") : "";
        const cls = "sortable" + (c.hideMobile ? " hide-mobile" : "");
        return `<th class="${cls}" data-table="${tableName}" data-key="${c.key}">${c.label}${arrow}</th>`;
      });
      return `<tr>${cells.join("")}</tr>`;
    }

    function bindSortHandlers(container) {
      container.querySelectorAll("th.sortable").forEach(th => {
        th.addEventListener("click", () => {
          const state = sortState[th.dataset.table];
          if (state.key === th.dataset.key) {
            state.dir = -state.dir;
          } else {
            state.key = th.dataset.key;
            state.dir = 1;
          }
          renderTables();
        });
      });
    }

    function renderTables() {
      if (!lastData) return;
      const data = lastData;

      // Spieler-Tabelle
      if (!data.players.length) {
        playersContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon"><svg class="ic" aria-hidden="true"><use href="#ic-users" xlink:href="#ic-users"/></svg></div>
          <div class="empty-state-text">Noch keine Spieler</div>
        </div>`;
      } else {
        let html = `<table class="games-table"><thead>`
          + headerRow(PLAYER_COLUMNS, sortState.players, "players")
          + `</thead><tbody>`;
        sortedRows(data.players, PLAYER_COLUMNS, sortState.players).forEach(p => {
          // Entfernte Spieler nur ausgrauen – sie können jederzeit zurückkommen
          html += `<tr class="${p.active ? "" : "inactive"}">
            <td>${esc(p.name)}</td>
            <td>${p.rounds_played}</td>
            <td>${p.total_duration_formatted}</td>
            <td class="hide-mobile">${p.start_cups > 0 ? p.start_cups + " " + CUP_SVG : "–"}</td>
            <td>${p.participation}%</td>
          </tr>`;
        });
        playersContainer.innerHTML = html + "</tbody></table>";
        bindSortHandlers(playersContainer);
      }

      // Runden-Tabelle (unsortiert: neueste zuerst)
      if (!data.rounds.length) {
        roundsContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon"><svg class="ic" aria-hidden="true"><use href="#ic-music" xlink:href="#ic-music"/></svg></div>
          <div class="empty-state-text">Noch keine Runden</div>
          <p style="margin-top: 12px; color: #999;">Starte die Musik, um eine Runde zu tracken.</p>
        </div>`;
      } else {
        const longest = data.summary.longest_round;
        let html = `<table class="games-table"><thead>`
          + headerRow(ROUND_COLUMNS, sortState.rounds, "rounds")
          + `</thead><tbody>`;
        const rows = sortState.rounds.key
          ? sortedRows(data.rounds, ROUND_COLUMNS, sortState.rounds)
          : [...data.rounds].reverse();
        rows.forEach(r => {
          const running = r.ended_at === null;
          // Die längste Runde wird dezent hervorgehoben
          const isLongest = longest !== null && r.duration === longest;
          html += `<tr class="${isLongest ? "longest" : ""}">
            <td>${formatDateTime(r.started_at)}</td>
            <td>${esc(modeLabels[r.mode] || r.mode)}</td>
            <td>${running ? "<span style='color:var(--add);font-weight:600;'>läuft …</span>" : r.duration_formatted + (isLongest ? " " + ic("ic-clock") : "")}</td>
            <td>${r.player_count}</td>
          </tr>`;
        });
        roundsContainer.innerHTML = html + "</tbody></table>";
        bindSortHandlers(roundsContainer);
      }
    }

    function checkCurrentEvening() {
      const link = document.getElementById("backToEveningLink");
      const exportLink = document.getElementById("exportLink");
      if (eveningCode) {
        link.href = `/abend/${eveningCode}`;
        link.style.display = "inline-block";
        // Download der beiden CSVs (Spieler + Runden) als ZIP
        exportLink.href = `/api/evening/${encodeURIComponent(eveningCode)}/export`;
        exportLink.style.display = "inline-block";
      } else {
        link.style.display = "none";
        exportLink.style.display = "none";
      }
    }

    // Load statistics on page load
    loadModeLabels().then(loadStatistics);
    checkCurrentEvening();

    // Auto-refresh every 30 seconds
    setInterval(loadStatistics, 30000);
  </script>
</body>
</html>
