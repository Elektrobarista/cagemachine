<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Statistik - Rage Cage</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #333;
      font-weight: 700;
    }

    .nav-link {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .nav-link:hover {
      background: #5568d3;
    }

    .stats-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .games-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .games-table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
    }

    .games-table td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .games-table tr:hover {
      background: #f8f9fa;
    }


    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
        <a href="/" class="nav-link" id="backToEveningLink" style="display: none; background: #10b981;">🍺 Zum laufenden Abend</a>
      </div>
      
      <h1>📊 Statistik <span id="eveningCodeTitle" style="color: #667eea;"></span></h1>

      <div class="stats-overview" id="statsOverview">
        <div class="stat-card">
          <div class="stat-value" id="totalRounds">-</div>
          <div class="stat-label">Runden</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalDuration">-</div>
          <div class="stat-label">Gesamte Spielzeit</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="longestRound">-</div>
          <div class="stat-label">Längste Runde</div>
        </div>
      </div>

      <h2 style="font-size: 20px; margin-bottom: 4px;">👥 Spieler</h2>
      <div id="playersContainer">
        <div class="loading">Lade Statistik...</div>
      </div>

      <h2 style="font-size: 20px; margin: 28px 0 4px;">🎵 Runden</h2>
      <div id="roundsContainer"></div>
    </div>
  </div>

  <script>
    const API_BASE = "";
    const playersContainer = document.getElementById("playersContainer");
    const roundsContainer = document.getElementById("roundsContainer");

    // Abend-Code: URL (/statistics/<code>) vor localStorage
    const pathMatch = window.location.pathname.match(/^\/statistics\/([A-Za-z0-9]+)$/);
    const eveningCode = pathMatch ? pathMatch[1].toUpperCase()
      : localStorage.getItem("cagemachine:lastEveningCode");

    function esc(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    async function apiCall(endpoint, method = "GET", body = null) {
      try {
        const options = {
          method: method,
          headers: {
            "Content-Type": "application/json"
          }
        };
        if (body) {
          options.body = JSON.stringify(body);
        }
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        // Prüfe ob Response erfolgreich war
        if (!response.ok) {
          // Versuche JSON-Fehler zu lesen, sonst generischer Fehler
          try {
            const errorData = await response.json();
            return errorData;
          } catch {
            return { error: `HTTP ${response.status}: ${response.statusText}` };
          }
        }
        
        const data = await response.json();
        return data;
      } catch (error) {
        console.error("API-Fehler:", error);
        // Gebe konsistentes Fehlerformat zurück, das von allen Handlern erwartet wird
        return { error: "Netzwerk-Fehler: " + (error.message || "Verbindung zum Server fehlgeschlagen") };
      }
    }

    function formatDateTime(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      return date.toLocaleString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    const MODE_LABELS = {
      "classic": "Classic",
      "headstart_165": "Headstart 2:45",
      "headstart_465": "Headstart 7:45"
    };

    async function loadStatistics() {
      if (!eveningCode) {
        playersContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">🍺</div>
          <div class="empty-state-text">Kein Abend ausgewählt</div>
          <p style="margin-top: 12px; color: #999;">Starte einen Abend oder öffne /statistics/&lt;Code&gt;.</p>
        </div>`;
        return;
      }

      const data = await apiCall(`/api/evening/${encodeURIComponent(eveningCode)}/statistics`, "GET");

      if (data.error) {
        playersContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <div class="empty-state-text">${esc(data.error)}</div>
        </div>`;
        return;
      }

      document.getElementById("eveningCodeTitle").textContent = data.evening.code;
      document.getElementById("totalRounds").textContent = data.summary.total_rounds;
      document.getElementById("totalDuration").textContent = data.summary.total_duration_formatted || "00:00";
      document.getElementById("longestRound").textContent =
        data.summary.longest_round !== null ? data.summary.longest_round_formatted : "–";

      // Spieler-Tabelle
      if (!data.players.length) {
        playersContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">👥</div>
          <div class="empty-state-text">Noch keine Spieler</div>
        </div>`;
      } else {
        let html = `
          <table class="games-table">
            <thead>
              <tr><th>Spieler</th><th>Runden</th><th>Spielzeit</th><th>Position</th></tr>
            </thead>
            <tbody>
        `;
        data.players.forEach(p => {
          const name = esc(p.name) + (p.active ? "" : " <span style='color:#999;'>(ausgeschieden)</span>");
          const pos = p.last_position === null ? "–"
            : (p.last_position === 1 ? "1 🍺" : p.last_position);
          html += `<tr>
            <td>${name}</td>
            <td>${p.rounds_played}</td>
            <td>${p.total_duration_formatted}</td>
            <td>${pos}</td>
          </tr>`;
        });
        playersContainer.innerHTML = html + "</tbody></table>";
      }

      // Runden-Tabelle
      if (!data.rounds.length) {
        roundsContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">🎵</div>
          <div class="empty-state-text">Noch keine Runden</div>
          <p style="margin-top: 12px; color: #999;">Starte die Musik, um eine Runde zu tracken.</p>
        </div>`;
      } else {
        let html = `
          <table class="games-table">
            <thead>
              <tr><th>Gestartet am</th><th>Modus</th><th>Dauer</th><th>Mitspieler</th></tr>
            </thead>
            <tbody>
        `;
        // Neueste zuerst
        [...data.rounds].reverse().forEach(r => {
          const running = r.ended_at === null;
          html += `<tr>
            <td>${formatDateTime(r.started_at)}</td>
            <td>${esc(MODE_LABELS[r.mode] || r.mode)}</td>
            <td>${running ? "<span style='color:#10b981;font-weight:600;'>läuft …</span>" : r.duration_formatted}</td>
            <td>${r.player_count}</td>
          </tr>`;
        });
        roundsContainer.innerHTML = html + "</tbody></table>";
      }
    }

    function checkCurrentEvening() {
      const link = document.getElementById("backToEveningLink");
      if (eveningCode) {
        link.href = `/abend/${eveningCode}`;
        link.style.display = "inline-block";
      } else {
        link.style.display = "none";
      }
    }

    // Load statistics on page load
    loadStatistics();
    checkCurrentEvening();

    // Auto-refresh every 30 seconds
    setInterval(loadStatistics, 30000);
  </script>
</body>
</html>
