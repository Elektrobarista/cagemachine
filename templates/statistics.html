<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Statistik - Rage Cage</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #333;
      font-weight: 700;
    }

    .nav-link {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .nav-link:hover {
      background: #5568d3;
    }

    .stats-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .games-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .games-table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #e0e0e0;
    }

    .games-table td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .games-table tr:hover {
      background: #f8f9fa;
    }


    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 18px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
        <a href="/" class="nav-link" id="backToEveningLink" style="display: none; background: #10b981;">🍺 Zum laufenden Abend</a>
      </div>
      
      <h1>📊 Statistik</h1>

      <div class="stats-overview" id="statsOverview">
        <div class="stat-card">
          <div class="stat-value" id="totalStarts">-</div>
          <div class="stat-label">Audio-Starts</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalDuration">-</div>
          <div class="stat-label">Gesamte Audio-Zeit</div>
        </div>
      </div>

      <div id="audioContainer">
        <div class="loading">Lade Statistik...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "";
    const statsOverview = document.getElementById("statsOverview");
    const audioContainer = document.getElementById("audioContainer");

    async function apiCall(endpoint, method = "GET", body = null) {
      try {
        const options = {
          method: method,
          headers: {
            "Content-Type": "application/json"
          }
        };
        if (body) {
          options.body = JSON.stringify(body);
        }
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        // Prüfe ob Response erfolgreich war
        if (!response.ok) {
          // Versuche JSON-Fehler zu lesen, sonst generischer Fehler
          try {
            const errorData = await response.json();
            return errorData;
          } catch {
            return { error: `HTTP ${response.status}: ${response.statusText}` };
          }
        }
        
        const data = await response.json();
        return data;
      } catch (error) {
        console.error("API-Fehler:", error);
        // Gebe konsistentes Fehlerformat zurück, das von allen Handlern erwartet wird
        return { error: "Netzwerk-Fehler: " + (error.message || "Verbindung zum Server fehlgeschlagen") };
      }
    }

    function formatDateTime(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);
      return date.toLocaleString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function loadStatistics() {
      const data = await apiCall("/api/statistics/audio", "GET");
      
      if (data.error) {
        audioContainer.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <div class="empty-state-text">Fehler beim Laden der Statistik</div>
        </div>`;
        return;
      }

      // Update Overview
      document.getElementById("totalStarts").textContent = data.total_starts || 0;
      document.getElementById("totalDuration").textContent = data.total_duration_formatted || "00:00";

      // Render Audio Events
      if (!data.completed_events || data.completed_events.length === 0) {
        audioContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎵</div>
            <div class="empty-state-text">Noch keine Audio-Events</div>
            <p style="margin-top: 12px; color: #999;">Starte die Musik, um Events zu tracken.</p>
          </div>
        `;
        return;
      }

      let tableHTML = `
        <table class="games-table">
          <thead>
            <tr>
              <th>Gestartet am</th>
              <th>Beendet am</th>
              <th>Dauer</th>
            </tr>
          </thead>
          <tbody>
      `;

      data.completed_events.forEach(event => {
        tableHTML += `
          <tr>
            <td>${formatDateTime(event.started_at)}</td>
            <td>${formatDateTime(event.ended_at)}</td>
            <td>${event.duration_formatted || "00:00"}</td>
          </tr>
        `;
      });

      tableHTML += `
          </tbody>
        </table>
      `;

      audioContainer.innerHTML = tableHTML;
    }

    function checkCurrentEvening() {
      // Zuletzt genutzter Abend-Code aus dem Browser (kein Server-Zustand mehr)
      const lastCode = localStorage.getItem("cagemachine:lastEveningCode");
      const link = document.getElementById("backToEveningLink");
      if (lastCode) {
        link.href = `/abend/${lastCode}`;
        link.style.display = "inline-block";
      } else {
        link.style.display = "none";
      }
    }

    // Load statistics on page load
    loadStatistics();
    checkCurrentEvening();

    // Auto-refresh every 30 seconds
    setInterval(loadStatistics, 30000);
  </script>
</body>
</html>
