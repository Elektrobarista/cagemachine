services:
  cagemachine:
    build: .
    image: cagemachine
    container_name: cagemachine
    init: true   # tini als PID 1 (Signale + Zombie-Reaping)
    ports:
      - "3000:3000"
    volumes:
      # Pflicht fürs Audio: ogg muss vor dem Start in ./static/ liegen (README)
      - ./static:/app/static:ro
      - ./data:/app/data   # SQLite-Persistenz
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=3000
    restart: unless-stopped

