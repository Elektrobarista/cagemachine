version: '3.8'

services:
  cagemachine:
    build: .
    container_name: cagemachine
    ports:
      - "3000:3000"
    volumes:
      # Optional: Mount static files wenn du sie ändern willst ohne Rebuild
      - ./static:/app/static:ro
      # SQLite-Daten (Abende, Spieler, Runden) über Container-Neustarts hinweg
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=3000
    restart: unless-stopped

