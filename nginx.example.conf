# Beispiel-nginx-Config
#
# Die App darf NUR über diesen Proxy erreichbar sein, sonst kann ein Client die
# Forwarded-Header direkt fälschen. Je nach Topologie:
#   - nginx auf demselben Host: App an 127.0.0.1 binden (FLASK_HOST=127.0.0.1
#     bzw. Docker-Mapping 127.0.0.1:3000:3000) und unten proxy_pass 127.0.0.1.
#   - nginx auf eigenem Server (App im privaten Netz): proxy_pass auf die
#     private-Netz-Adresse der App; die Firewall lässt nur den Proxy zum Port.
#
# Nach dem Anpassen: nach /etc/nginx/sites-available/ kopieren, per Symlink
# in sites-enabled/ aktivieren, `nginx -t` prüfen, `systemctl reload nginx`.

server {
    listen 80;
    server_name ragecage.example.com;   # <-- eigene Domain eintragen

    # Für HTTPS: mit certbot ein Zertifikat holen (certbot --nginx). certbot
    # ergänzt dann automatisch die listen-443/ssl-Zeilen und leitet 80 -> 443 um.

    location / {
        # Ziel an die Topologie anpassen: 127.0.0.1 (nginx auf demselben Host)
        # oder die private-Netz-Adresse des App-Servers.
        proxy_pass http://127.0.0.1:3000;

        # Diese Header wertet die App (ProxyFix) aus, damit teilbare Links,
        # QR-Codes und das Rate-Limiting die echte Adresse/Client-IP sehen:
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSockets/lange Verbindungen unkritisch hier, aber schadet nicht:
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
